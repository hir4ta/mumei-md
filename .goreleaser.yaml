version: 2
project_name: mumei-md

before:
  hooks:
    - go mod tidy

builds:
  - id: mm
    main: ./cmd/mm
    binary: mm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    name_template: "mm_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - sample.md
      - LICENSE*

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

release:
  github:
    owner: hir4ta
    name: mumei-md
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

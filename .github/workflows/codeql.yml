name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mon 03:00 UTC — weekly CodeQL audit. Off-peak vs. scorecards (04:00)
    # and gitleaks-weekly (05:00).
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Force every Node 20-based action onto Node 24 ahead of the 2026 forced
  # migration. Keeps CI behavior invariant across the runner change-over.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go, actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          category: "/language:${{ matrix.language }}"

name: release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # OIDC token for keyless Sigstore signing (cosign + attest-build-provenance).
      id-token: write
      # Write SLSA build provenance attestations to the GitHub attestation store.
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # GoReleaser needs the token via env (set below) and signs the
          # release through that, not via the persisted git credential.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      # Gate: block releases that depend on a Go module with a known CVE.
      # This is redundant with .github/workflows/govulncheck.yml (which runs
      # on every PR and push to main) but acts as a final defensive check
      # before binaries leave the build system.
      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: stable
          repo-checkout: false

      - name: Install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cosign (for keyless signing of checksums.txt)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # SLSA build provenance for every release tarball. The attestation
      # is published to GitHub's attestation store and to Sigstore's
      # transparency log. Consumers verify with:
      #   gh attestation verify <tarball> --repo hir4ta/miru
      - name: Generate build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/miru_*.tar.gz
            dist/checksums.txt
